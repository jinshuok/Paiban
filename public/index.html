<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>排班大师 v2.0</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  :root { --accent:#4f46e5; }
  body { font-family:'Inter',-apple-system,sans-serif; }
  .font-mono { font-family:'JetBrains Mono',monospace; }
  /* custom scrollbar */
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:#94a3b8; }
  /* sticky table */
  .stickyleft { position:sticky; left:0; z-index:10; }
  .stickyleft2 { position:sticky; left:160px; z-index:10; }
  @media (max-width:768px) {
    .desktop-only { display:none !important; }
    .mobile-only { display:flex !important; }
  }
  @media (min-width:769px) {
    .mobile-only { display:none !important; }
  }
</style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col overflow-hidden">

<!-- Header -->
<header class="h-14 bg-white border-b border-slate-200 flex items-center px-4 gap-3 shrink-0 z-30">
  <div class="flex items-center gap-2">
    <div class="w-8 h-8 rounded-lg bg-indigo-600 text-white flex items-center justify-center font-semibold text-sm">班</div>
    <div class="flex flex-col leading-none">
      <span class="font-semibold text-slate-800 tracking-tight">排班大师</span>
      <span id="tenantBadge" class="text-[10px] text-slate-400 font-medium mt-0.5 hidden">default</span>
    </div>
  </div>
  <div class="w-px h-5 bg-slate-200 hidden sm:block"></div>
  <div class="flex items-center gap-1">
    <button id="prevBtn" class="w-8 h-8 rounded-lg border border-slate-200 hover:bg-slate-50 flex items-center justify-center text-slate-500 transition">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <span id="monthLabel" class="min-w-[80px] text-center text-sm font-medium font-mono">2026-04</span>
    <button id="nextBtn" class="w-8 h-8 rounded-lg border border-slate-200 hover:bg-slate-50 flex items-center justify-center text-slate-500 transition">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>
  <div class="flex-1"></div>
  <div id="topLegend" class="hidden md:flex items-center gap-2 flex-wrap"></div>
  <div class="flex-1"></div>
  <div class="flex items-center gap-2">
    <button id="settingsBtn" class="h-8 px-3 rounded-lg border border-slate-200 hover:bg-slate-50 text-sm font-medium text-slate-600 transition flex items-center gap-1">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      <span class="hidden sm:inline">设置</span>
    </button>
    <button id="exportBtn" class="h-8 px-3 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium transition flex items-center gap-1">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
      <span class="hidden sm:inline">导出</span>
    </button>
  </div>
</header>

<!-- Desktop Table -->
<div class="desktop-only flex-1 overflow-hidden">
  <main id="mainScroll" class="h-full overflow-auto">
    <div id="tableWrap" class="inline-block min-w-full">
      <div id="tableHead" class="flex sticky top-0 z-20 bg-white border-b-2 border-slate-200"></div>
      <div id="tableBody"></div>
    </div>
  </main>
</div>

<!-- Mobile View -->
<div id="mobileView" class="mobile-only flex-1 overflow-y-auto p-3 flex-col gap-3"></div>

<!-- Desktop Batch Popup -->
<div id="batchPopup" class="hidden fixed z-50 bg-white border border-slate-200 rounded-xl shadow-2xl p-3 min-w-[200px] animate-[fadeIn_.15s_ease]">
  <div id="batchPopupHeader" class="text-xs font-semibold text-slate-500 mb-2 pb-2 border-b border-slate-100">已选 0 格</div>
  <div class="mb-2">
    <div class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">上班时间</div>
    <div id="batchWorkBtns" class="flex flex-wrap gap-1"></div>
  </div>
  <div class="mb-1">
    <div class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-1">休息 / 假期</div>
    <div id="batchRestBtns" class="flex flex-wrap gap-1"></div>
  </div>
  <button id="batchCancelBtn" class="w-full mt-2 py-1.5 rounded-lg text-xs font-medium text-slate-500 bg-slate-50 hover:bg-slate-100 border border-slate-200 transition">取消</button>
</div>

<!-- Mobile Batch Sheet -->
<div id="mobileSheetOverlay" class="hidden fixed inset-0 bg-black/30 z-[190]"></div>
<div id="mobileBatchSheet" class="fixed left-0 right-0 bottom-0 bg-white rounded-t-2xl shadow-[0_-4px_24px_rgba(0,0,0,0.15)] z-[200] p-4 translate-y-full transition-transform duration-300">
  <div class="flex items-center justify-between mb-3 pb-3 border-b border-slate-100">
    <span class="font-semibold text-slate-800">批量设置</span>
    <span id="mobileSheetCount" class="text-xs text-slate-400">已选 0 格</span>
    <button id="mobileSheetClose" class="w-7 h-7 rounded-md bg-slate-100 text-slate-500 flex items-center justify-center text-sm">✕</button>
  </div>
  <div class="mb-3">
    <div class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-2">上班时间</div>
    <div id="mobileSheetWorkBtns" class="flex flex-wrap gap-2"></div>
  </div>
  <div>
    <div class="text-[10px] font-bold uppercase tracking-wider text-slate-400 mb-2">休息 / 假期</div>
    <div id="mobileSheetRestBtns" class="flex flex-wrap gap-2"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="fixed top-16 right-4 bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-lg opacity-0 -translate-y-2 transition pointer-events-none z-[300]"></div>

<!-- Settings Modal -->
<div id="settingsModal" class="hidden fixed inset-0 bg-black/40 z-[400] items-center justify-center">
  <div class="bg-white rounded-2xl shadow-2xl w-[720px] max-w-[95vw] max-h-[85vh] flex flex-col animate-[modalIn_.2s_ease]">
    <div class="px-5 py-4 border-b border-slate-100 flex items-center gap-3 flex-wrap">
      <span class="font-semibold text-slate-800 text-base flex-1 min-w-[80px]">设置</span>
      <div class="flex gap-1 bg-slate-100 p-1 rounded-lg">
        <button class="modal-tab active px-3 py-1 rounded-md text-xs font-medium transition" data-tab="members">成员管理</button>
        <button class="modal-tab px-3 py-1 rounded-md text-xs font-medium text-slate-500 hover:text-slate-700 transition" data-tab="statuses">状态管理</button>
      </div>
      <button id="modalClose" class="w-7 h-7 rounded-lg hover:bg-slate-100 text-slate-400 hover:text-slate-600 flex items-center justify-center text-sm transition">✕</button>
    </div>
    <div id="modalBody" class="flex-1 overflow-y-auto p-5"></div>
    <div class="px-5 py-3 border-t border-slate-100 flex justify-end gap-2">
      <button id="modalCancel" class="h-9 px-4 rounded-lg border border-slate-200 hover:bg-slate-50 text-sm font-medium text-slate-600 transition">取消</button>
      <button id="modalSave" class="h-9 px-4 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium transition">保存设置</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
